openapi: 3.1.0
info:
  title: StudyWell AI Platform Gateway API
  version: 0.1.0
servers:
  - url: http://localhost:8081
paths:
  /status:
    get:
      summary: Gateway status check
      responses:
        "200":
          description: Service is available
  /api/documents/ingest:
    post:
      summary: Ingest a document into the RAG index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, text]
              properties:
                title:
                  type: string
                source:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: Ingestion status
  /api/ai/chat:
    post:
      summary: Ask a RAG-backed AI question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                user_id:
                  type: string
      responses:
        "200":
          description: AI answer and retrieved sources
  /api/wellness/insights:
    post:
      summary: Generate study-life analytics summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signals:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: AI study-life insight
